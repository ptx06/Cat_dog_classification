data:
  root: ./data
  batch_size: 32
  num_workers: 4

model:
  name: mobilenet_v2
  pretrained: true
  num_classes: 2

train:
  epochs: 20
  lr: 0.001
  momentum: 0.9
  weight_decay: 1e-4
  lr_step_size: 7
  lr_gamma: 0.1
  save_dir: ./experiments/exp_001
  log_interval: 10   # 每多少batch打印一次

device: cuda